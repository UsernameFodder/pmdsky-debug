    - name: KecleonShopSubcaseManager1
      address:
        EU: 0x238B918
      description: |-
        Seems responsible for handling the majority of the frame update behavior for both kecleon shops, particularly window management.
        Shares this responsibility with KecleonShopSubcaseManager2.

        r0: subcase id (should eventually be an enum)
    - name: KecleonShopSubcaseManager2
      address:
        EU: 0x238CCC4
      description: |-
        Seems responsible for handling the majority of the frame update behavior for both kecleon shops, particularly window management.
        Shares this responsibility with KecleonShopSubcaseManager1.

        No params.
    - name: RemoveInvalidKecleonShopItems
      address:
        EU: 0x238E068
      description: |-
        Calls either RemoveInvalidKecleonShop1Items or RemoveInvalidKecleonShop2Items depending on which kecleon shop is active.
        
        No params.
    - name: KecleonShopSumBagItemSellPrices
      address:
        EU: 0x238E094
      description: |-
        Sums the sell prices of all items in the bag, presumably for the Sell All option for both kecleon shops.
        
        No params.
    - name: KecleonShopUpdatePortraitEmotion
      address:
        EU: 0x238E134
      description: |-
        Updates the portrait emotion for the currently active kecleon shop.
        Can only change the portrait to PORTRAIT_NORMAL or PORTRAIT_ANGRY.
        
        r0: 1 if angry, 0 if normal.
    - name: KecleonShopEntryPoint
      address:
        EU: 0x238E180
      description: |-
        The sole entry_point for the kecleon shop overlay.
        
        return: undefined4 
    - name: KecleonShopDestructor
      address:
