overlay22:
  versions:
    - EU
    - NA
    - JP
  address:
    EU: 0x238AC80
    NA: 0x238A140
    JP: 0x238B6A0
  length:
    EU: 0x4B40
    NA: 0x4B40
    JP: 0x4B40
  description: Controls the Kecleon Shop in Treasure Town.
  functions:
    - name: GreenKecleonShopUpdateItemNamesAndCollectionMenu
      address:
        EU: 0x238AC80
      description: |-
        Calls GreenKecleonShopFillItemNameData and GreenKecleonShopInitCollectionMenu, then returns.
        
        No params.
    - name: GreenKecleonShopInitCollectionMenu
      address:
        EU: 0x238AC90
      description: |-
        Seems to initialize a collection menu for green kecleon with data from GREEN_KEC_SHOP_ITEM_DATA_WRAPPER.
        
        return: collection menu window_id
    - name: GreenKecleonShopDoNothing
      address:
        EU: 0x238AD6C
      description: |-
        Does nothing but return. Is exclusively called by the green kecleon shop.
        
        No params.
    - name: GreenKecleonShopGetCollectionMenuStatus
      address:
        EU: 0x238AD70
      description: |-
        Seems to return some kind of status data for the collection menu from GREEN_KEC_SHOP_ITEM_DATA_WRAPPER.
        
        return: collection menu status?
    - name: GreenKecleonShopGetShopItemSlot
      address:
        EU: 0x238ADEC
      description: |-
        Seems to retrieve the item slot the cursor is currently pointing to from GREEN_KEC_SHOP_ITEM_DATA_WRAPPER.
        
        return: shop item slot index
    - name: GreenKecleonShopInitItemNameData
      address:
        EU: 0x238AE00
      description: |-
        Initializes a green_kec_shop_item_data struct in GREEN_KEC_SHOP_ITEM_DATA_WRAPPER.
        
        No params.
    - name: GreenKecleonShopFreeItemNameData
      address:
        EU: 0x238AE34
      description: |-
        Frees a green_kec_shop_item_data struct in GREEN_KEC_SHOP_ITEM_DATA_WRAPPER.
        
        No params.
    - name: GreenKecleonShopFillItemNameData
      address:
        EU: 0x238AE60
      description: |-
        Populates a green_kec_shop_item_data struct in GREEN_KEC_SHOP_ITEM_DATA_WRAPPER.
        
        No params.
    - name: GreenKecleonShopCountSelectedItems
      address:
        EU: 0x238B00C
      description: |-
        Counts the number of multi-selected items in the green kecleon shop.
        
        return: # of selected items.
    - name: GreenKecleonShopGetFirstSelectedItemIndex
      address:
        EU: 0x238B048
      description: |-
        Retrieves the index of the first multi-selected item in the green kecleon shop.
        
        return: index of the first selected shop item.
    - name: GreenKecleonShopSumSelectedItemPrices
      address:
        EU: 0x238B084
      description: |-
        Sums the prices of all currently selected items in the green kecleon shop.
        
        return: total price of all selected shop items.
    - name: GreenKecleonShopPurchaseSingleItem
      address:
        EU: 0x238B0C8
      description: |-
        Handles purchasing a single item from the green kecleon shop, by index.
        
        r0: shop item slot
    - name: GreenKecleonShopPurchaseSelectedItems
      address:
        EU: 0x238B10C
      description: |-
        Handles purchasing all selected items from the green kecleon shop.
        Will not be used if only one item is selected.
        
        No params.
    - name: GreenKecleonGetItemNameStringByIndex
      address:
        EU: 0x238B180
      description: |-
        Retrieves the item name string for a shop item in the green kecleon shop by index.
        
        r0: unused
        r1: int
        r2: uint
        return: item name string (buffer size 80)
    - name: GreenKecleonShopUnkCollectionMenuCallback
      address:
        EU: 0x238B1BC
      description: |-
        An unk_collection_menu_fn_t function used by GreenKecleonShopInitCollectionMenu.
        
        r0: uint
        return: undefined4 
    - name: GreenKecleonShopVoidFnCollectionMenuCallback
      address:
        EU: 0x238B2B4
      description: |-
        An unk_collection_menu_void_fn_t function used by GreenKecleonShopInitCollectionMenu.
        
        r0: uint
    - name: PurpleKecleonShopUpdateItemNamesAndCollectionMenu
