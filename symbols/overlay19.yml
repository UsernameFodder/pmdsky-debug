overlay19:
  versions:
    - EU
    - NA
    - JP
  address:
    EU: 0x238AC80
    NA: 0x238A140
    JP: 0x238B6A0
  length:
    EU: 0x4220
    NA: 0x4240
    JP: 0x4220
  description: "Controls Spinda's Juice Bar."
  functions:
    - name: GetBarItem
      address:
        EU: 0x238AC80
        NA: 0x238A140
        JP: 0x238B6A0
      description: |-
        Gets the struct bar_item from BAR_AVAILABLE_ITEMS with the specified item ID.
        
        r0: item ID
        return: struct bar_item*
    - name: SetMiracleDrinkStatCountRange
      address:
        EU: 0x238ACC0
      description: |-
        Retrieves the minimum and maximum stat boost for a miracle drink. In vanilla this is [2,5].
        
        r0: int*
        r1: int*
    - name: SetBadDrinkStatCountRange
      address:
        EU: 0x238ACD4
      description: |-
        Retrieves the minimum and maximum stat reduction for a bad drink. In vanilla this is [1,3].
        
        r0: int*
        r1: int*
    - name: GetBarItemResultWeights
      address:
        EU: 0x238ACE8
      description: |-
        Retrieves a pointer to the weights for normal, good, miracle, and bad drink results by item.
        The miracle drink event chance is actually a shared chance for a random drink event such as a dungeon unlock, recruit, or a real miracle drink.
        
        r0: item_id
        return: uint16_t*
    - name: BarGetDrinkEventWeights
      address:
        EU: 0x238ACF8
      description: |-
        Retrieves the static chances for an egg, recruit, dungeon unlock, or a miracle drink.
        
        return: uint16_t *
    - name: BarGetRandomValidEggRecruit
      aliases:
        - GetRecruitableMonsterAll
      address:
        EU: 0x238AD04
        NA: 0x238A1C4
        JP: 0x238B724
      description: |-
        Retrieves a random valid egg species for an egg event at the cafe.
        
        return: enum monster_id
    - name: BarGetValidEggGiverFromGourmetTable
      aliases:
        - GetRecruitableMonsterList
      address:
        EU: 0x238ADB4
        NA: 0x238A274
        JP: 0x238B7D4
      description: |-
        Retrieves a random valid species from BAR_RECRUITABLE_GOURMET_MONSTER_TABLE to serve as the egg giver for an egg event at the cafe.
        
        return: enum monster_id
    - name: BarGetRandomValidRecruitFromGourmetTable
      aliases:
        - GetRecruitableMonsterListRestricted
      address:
        EU: 0x238AE5C
        NA: 0x238A31C
        JP: 0x238B87C
      description: |-
        Retrieves a random valid species from BAR_RECRUITABLE_GOURMET_MONSTER_TABLE to serve as the recruit for an gourmet recruit event at the cafe.
        
        return: enum monster_id
    - name: BarGetUnlockableDungeonPtr
      address:
        EU: 0x238AF14
      description: |-
        If not zero, stores a double pointer to the BAR_UNLOCKABLE_DUNGEONS_TABLE to r0. Then returns 6 for some reason... 
        Unclear what this is intended to actually do...
        
        r0: struct bar_dungeon_unlock **
        return: Always 6?
    - name: BarPopulateUnlockableDungeons
      address:
        EU: 0x238AF2C
      description: |-
        Populates a pointer of dungeon ids based on the current $SCENARIO_BALANCE_FLAG and unlock statuses of dungeons in the BAR_UNLOCKABLE_DUNGEONS_TABLE.
        
        r0: struct dungeon_id_8*
        return: number of allowed dungeons
    - name: BarTryClosePortraitBox
      address:
        EU: 0x238AFA8
      description: |-
        Seems to handle closing portrait boxes for the overlay. 
        
        No params or return.
    - name: BarCaseManagerSub
      address:
        EU: 0x238AFE4
      description: |-
        Called once every frame by SpindaBarMenuUpdate if the bar_update_case is BAR_SUBCASE_FUNC.
        State Case with unique behaviors enumerated by enum bar_subcase.
        
        return: maybe a return code for SpindaBarMenuUpdate?
    - name: BarMaybeSetBarScrollBoxWindowId
      address:
        EU: 0x238B93C
      description: |-
        Seems to set the scroll_box_window_id for spinda_cafe.
        
        r0: undefined4
        r1: undefined4
        r2: undefined4
        return: undefined4
    - name: BarPopulateDrinkableBagItems
      address:
        EU: 0x238D0DC
      description: |-
        Populates an item list of only valid bar items within spinda_cafe.
        
        No params or return.
    - name: BarZeroInitPreprocessorFlagsAndReturnCase
      address:
        EU: 0x238D174
      description: |-
        Zero inits many preprocessor_flag fields, but also sets the return_case for scripts to zero within spinda_cafe.
        
        No params or return.
    - name: BarZeroInitBufferAndPreprocessorArgsZero
      address:
        EU: 0x238D1A4
      description: |-
        Zero initializes the preprocessor_args_0 and string_buffer_0 fields of spinda_cafe.
        
        return: bool for if buffer was empty string
    - name: BarTrySetEventMainActor
      address:
        EU: 0x238D1F8
      description: |-
        Seems to set ACTOR_NPC_EVENT_MAIN to whoever the player ordered the drink for.
        Seems to do other things before that though...
        
        return: undefined4
    - name: BarZeroInitBufferAndPreprocessorArgsOne
      address:
        EU: 0x238D2E4
      description: |-
        Zero initializes the preprocessor_args_1 and string_buffer_1 fields of spinda_cafe.
        
        return: bool for if buffer was empty string
    - name: BarPrintHpIncreaseString
      address:
        EU: 0x238D340
      description: |-
        Handles printing the correct text for a HP stat increase from a drink.
        
        r0: hp increase amount?
        r1: a different hp increase amount?
        return: undefined4
    - name: BarPrintOtherStatIncreaseString
      address:
        EU: 0x238D434
      description: |-
        Seems to handle printing the correct text for a non-HP, non-IQ stat increase from a drink.
        
        r0: stat increase amount?
        r1: a different stat increase amount?
        r2: Stat Index
        return: undefined4
    - name: BarPrintIqAndSkills
      address:
        EU: 0x238D524
      description: |-
        Seems to handle printing the correct text for an IQ stat increase from a drink, including learned skills.
        
        r0: IQ increase amount
        return: undefined4
    - name: BarPrintLevelMaxedOutString
      address:
        EU: 0x238D660
      description: |-
        Seems to handle printing the correct text for a "level increase" from a drink, but only if the pokemon is already level 100.
        
        r0: levels "increased"
    - name: BarDrawAndUpdateGainedIqSkills
      address:
        EU: 0x238D6F4
      description: |-
        Called by BarPrintIqAndSkills to name any IQ skills gained from a drink.
        
        r0: char
        r1: char
        r2: int
        r3: int
        stack[0]: int
        stack[1]: int
        stack[2]: int
        return: undefined4
    - name: BarUpdateDrinkEventNewStats
      address:
        EU: 0x238D820
      description: |-
        Actually apply stat changes from a drink.
        
        r0: struct bar_stats_data*
        r1: stored to bar_stats_data->stat_drink_event_kind
        return: undefined4
    - name: BarPrintReactionsAndStatIncreases
      address:
        EU: 0x238D9F4
      description: |-
        Seems to handle drink reactions, and calling the correct stat increase text function.
        
        r0: struct bar_stats_data*
    - name: BarHandleDrinkEventSubcase
      address:
        EU: 0x238DC0C
      description: |-
        Has different behavior based on the type of drink. Usually assigns the next correct bar_subcase, and for good stat based drink events, seems to handle or roll that somehow. 
        
        No params or return.
    - name: BarPostDrinkCaseForCustomer
      address:
        EU: 0x238DE44
      description: |-
        Sets the correct bar_update_case after completing a drink, depending on who ordered the drink.
        
        No params or return.
    - name: BarMaybeIsClosedUnkStringIdMenu
      address:
        EU: 0x238DEBC
      description: |-
        Seems to check if a currently unknown String Id based menu type's window is closed?
        Just a guess.
        
        return: undefined4
    - name: BarCreateUnkStringIdMenu
      address:
        EU: 0x238DED4
      description: |-
        Seems to handle initialization of a currently unknown String Id based menu type.
        
        r0: undefined4
        r1: undefined4
        r2: struct simple_menu_id_item*
        r3: undefined4
        stack[0]: char
        stack[1]: uint32_t
    - name: GetUnkStringIdMenuResult
      address:
        EU: 0x238DF4C
      description: |-
        Seems to retrieve the result of some kind of player choice from a currently unknown String Id based menu type.
        
        return: menu result
    - name: BarTryShowPortrait
      address:
        EU: 0x238DF84
      description: |-
        Calls ShowPortraitInPortraitBox with portrait data from the spinda_cafe struct.
        
        No params or return.
    - name: BarTryHidePortrait
      address:
        EU: 0x238DFB0
      description: |-
        Calls HidePortraitBox with portrait data from the spinda_cafe struct.
        
        No params or return.
    - name: BarInventoryMenuCallback
      address:
        EU: 0x238DFD8
      description: |-
        Seems to be some sort of callback function used by an inventory menu for the cafe.
        
        r0: undefined4
        r1: spinda_cafe->item_validities index?
        r2: undefined4
        return: undefined4
    - name: BarTryCloseInventoryMenu
      address:
        EU: 0x238E018
      description: |-
        Calls CloseInventoryMenu with spinda_cafe->inventory_window_id.
        
        No params or return.
    - name: BarTryCloseTeamMovesMenu
      address:
        EU: 0x238E050
      description: |-
        Calls CloseAdvancedTextBox with spinda_cafe->inventory_window_id.
        Contextually seems responsible for closing the menu for team moves.
        
        No params or return.
    - name: SpindaBarEntry
      address:
        EU: 0x238E0A0
      description: |-
        First entry point into overlay 19, called by MENU_JUICE_BAR.
        
        return: undefined4
    - name: SpindaBarResume
      address:
        EU: 0x238E130
      description: |-
        Subsequent entry point into overlay 19, called by MENU_JUICE_BAR_PICK_ITEM.
        
        return: undefined4
    - name: SpindaBarDestruct
      address:
        EU: 0x238E1C0
      description: |-
        The destructor of overlay 19 for both entry points.
        Does nothing but call BarTryClosePortraitBox...
        
        No params or return.
    - name: SpindaBarMenuUpdate
      address:
        EU: 0x238E1CC
      description: |-
        Called every frame overlay 19 is active, primarily handling interface between the script, and BarCaseManagerSub.
        return: undefined4
