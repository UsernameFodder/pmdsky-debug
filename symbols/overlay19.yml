        NA: 0x8
      description: |-
        Weights for a "miracle drink event" to be an egg, a gourmet recruit, a dungeon unlock, or a regular miracle drink in that order.
        By default, it's 10 weight for each.
        type: int16_t[4]
    - name: BAR_UNLOCKABLE_DUNGEONS_TABLE
