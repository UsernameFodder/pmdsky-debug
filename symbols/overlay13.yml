overlay13:
  versions:
    - EU
    - NA
    - JP
  address:
    EU: 0x238AC80
    NA: 0x238A140
    JP: 0x238B6A0
  length:
    EU: 0x2E80
    NA: 0x2E80
    JP: 0x2E80
  description: "Controls the personality test, including the available partners and playable Pokémon. The actual personality test questions are stored in the MESSAGE folder."
  functions:
    - name: PersonalityTestEntryPoint
      aliases:
        - EntryOverlay13
      address:
        EU: 0x238AC80
        NA: 0x238A140
        JP: 0x238B6A0
      description: |-
        Called when this overlay is loaded. Allocates and initializes the personality_test struct, and updates PERSONALITY_TEST_PTR.
        
        No params.
    - name: PersonalityTestDestructor
      aliases:
        - ExitOverlay13
      address:
        EU: 0x238ACD0
        NA: 0x238A190
        JP: 0x238B6F0
      description: |-
        Called before unloading the overlay. Frees the allocated personality_test struct, and clears PERSONALITY_TEST_PTR.
        
        No params.
    - name: PersonalityTestFrameUpdate
      address:
        EU: 0x238AD08
        NA: 0x238A1C8
        JP: 0x238B728
      description: |-
        Called every frame while the overlay is loaded. Uses a switch case with PERSONALITY_TEST_PTR->outer_state, where an outer_state of 0xD will call PersonalityTestMainManager. Most outer_states seem to try to head towards this state. Handles the 'return' value from MENU_PERSONALITY_TEST called by scripts. 
        
        return: int?
    - name: PersonalityTestMainManager
      address:
        EU: 0x238B0B4
        NA: 0x238A574
        JP: 0x238BAD4
      description: |-
        Handles the majority of the logic for the entire personality test, including picking/answering questions, determining aura color, touching the aura bow, choosing the partner species, and more. Uses a switch case with PERSONALITY_TEST_PTR->state to track where we are in the overall test sequence.
        
        No params.
    - name: GetPersonality
      address:
        EU: 0x238C8E8
        NA: 0x238BDA8
        JP: 0x238D30C
      description: |-
        Returns the personality obtained after answering all the questions.
        
        The value to return is determined by checking the points obtained for each the personalities and returning the one with the highest amount of points. This is where the "tiebreaker bonus points" are applied.
        
        In the case that there is still a tie after applying the tiebreaker bonus points, the first personality in the list of tying personalities takes priority.
        
        return: Personality (0-15)
    - name: GetPartnerOptionString
      aliases:
        - GetOptionStringFromID
      address:
        EU: 0x238C930
        NA: 0x238BDF0
        JP: 0x238D354
      description: |-
        Gets the string for a partner option (gender symbol + name) and puts it in the provided buffer. Returns the same buffer pointer that was passed in (for some reason).
        
        r0: [output] buffer
        r1: Index in PERSONALITY_TEST_PTR->partner_options
        return: buffer
    - name: WaitForNextStep
      address:
        EU: 0x238C98C
        NA: 0x238BE4C
        JP: 0x238D3B0
      description: |-
        Sets the current state in PERSONALITY_TEST_PTR to WAIT_NEXT_STEP, and sets the future state to the provided state.
        
        r0: Next state for after the WAIT_NEXT_STEP state finishes
    - name: DrawPersonalityTestDebug
      address:
        EU: 0x238C9AC
        NA: 0x238BE6C
        JP: 0x238D3D0
      description: |-
        Updates and draws the text for the personality test debug window that shows the scores for each personality. Assumes that the window exists.
        
        r0: Window ID for the debug window
