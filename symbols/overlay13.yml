      description: |-
        A sort of menu item buffer for quiz answers. The result_values are static, but the string_ids are changed for each question to its corresponding answers, with a string_id of 0 being used as a terminator.
        
        The exact size on this is strange. There are 8 filled entries, with the 9th seemingly acting as a terminator, yet CreateSimpleMenuFromStringIds is called with n_items = 10. Additionally, multiple other parts of the personality_test struct expect there to be a maximum of 4 answers to any given question.
        
        Maybe earlier in development there were plans to support more questions? Alternatively, maybe this was/is additionally used for some debug menu that has more options; This would explain why Irdkwia's notes called it QUIZ_DEBUG_MENU_ITEMS, at least.
        
        type: simple_menu_id_item[9]
