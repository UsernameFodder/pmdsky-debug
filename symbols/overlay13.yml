    - name: STARTERS_TYPE_INCOMPATIBILITY_TABLE
      address:
        EU: 0x238CC38
        NA: 0x238C0F8
        JP: 0x238D660
      length:
        EU: 0x54
        NA: 0x54
        JP: 0x54
      description: |-
        An array representing each type as different bits.
        
        [type_id] = 1 << (type_id - 1), so 0b0 = None, 0b1 = Normal, 0b10 = Fire, etc...
        
        A "bitflag" integer is created for the hero species' types and each potential partner species' types, using this table with bitwise OR. If any bits are shared between the hero bitflag and a partner's bitflag (if the result of a bitwise AND != 0), the hero shares a type with the potential partner, and the partner is invalid.
        
        type: uint32_t[18]
