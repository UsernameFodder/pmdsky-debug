      address:
        EU: 0x238C0EC
        NA: 0x238B5AC
        JP: 0x238CB0C
      description: |-
        Seems to close all windows of the recycle shop when called. Retrieves window_ids from RECYCLE_SHOP_UNK_STRUCT_SIZE_84H_PTR. 
        
        No params.
    - name: RecycleShopHandleTopScreenWindow
      address:
        EU: 0x238C19C
        NA: 0x238B65C
        JP: 0x238CBBC
      description: |-
        Seems to generally manage the top screen window during item selection, assigning the below callbacks to some window creation function.
        
        return: undefined4
    - name: RecycleShopTopScreenDrawItemStats
      address:
        EU: 0x238C40C
        NA: 0x238B8CC
        JP: 0x238CE2C
      description: |-
        Seems to display the trade info and stats for the item the cursor is currently on on the top screen window.
        
        r0: int
    - name: RecycleShopTopScreenDrawItemName
      address:
        EU: 0x238C580
        NA: 0x238BA40
        JP: 0x238CFA0
      description: |-
        Seems to print the item the cursor is currently on to the top screen window. 
        
        r0: window_id
    - name: RecycleShopTopScreenDrawInfoWindow
      address:
        EU: 0x238C5F4
        NA: 0x238BAB4
        JP: 0x238D014
      description: |-
        Seems to display the bottom window in the top screen display of the recycle shop, which explains how to read the top window.
        
        r0: window_id
        r1: undefined4
        r2: undefined4
        r3: undefined4
    - name: DisplaySelectionTutorialWindow
      address:
        EU: 0x238DA60
        NA: 0x238CF20
        JP: 0x238E47C
      description: |-
