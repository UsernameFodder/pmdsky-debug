  functions:
    - name: RecycleShopEntryPointFirst
      address:
        EU: 0x238AC80
        NA: 0x238A140
        JP: 0x238B6A0
      description: |-
        The entry point for the overlay, when called by MENU_RECYCLE_SHOP, serving to initialize the recycle shop.
        Calls RecycleShopCommonEntryPoint(0).
        
        return: undefined4
    - name: RecycleShopEntryPointResume
      address:
        EU: 0x238AC90
        NA: 0x238A150
        JP: 0x238B6B0
      description: |-
        The entry point for the overlay, when called by MENU_RECYCLE_SHOP2, resuming operations of the overlay.
        Calls RecycleShopCommonEntryPoint(0).
        
        return: undefined4
    - name: RecycleShopDestructor
      address:
        EU: 0x238ACA0
        NA: 0x238A160
        JP: 0x238B6C0
      description: |-
        The shared destructor of both recycle shop overlay_load_entries, suspending operations of the overlay.
        
        No params.
    - name: RecycleShopFrameUpdate
      address:
        EU: 0x238ACF0
        NA: 0x238A1B0
        JP: 0x238B710
      description: |-
        The shared frame_update of both recycle shop overlay_load_entries, managing operations of the overlay each frame.
        
        return: undefined4
    - name: RecycleShopCommonEntryPoint
      address:
        EU: 0x238BDD4
        NA: 0x238B294
        JP: 0x238C7F4
      description: |-
        Effectively the shared entry_point of both recycle shop overlay_load_entry, called immediately by both real entry_points to the overlay.
        
        r0: 1 if resuming, 0 if first entry.
        return: undefined4
    - name: PrintWynautTextbox
      address:
        EU: 0x238BE80
        NA: 0x238B340
        JP: 0x238C8A0
      description: |-
        Seems to display a textbox with wynaut's default portrait and a specified text string id.
        
        r0: string_id
    - name: PrintWynautSimpleMenu
      address:
        EU: 0x238BEDC
        NA: 0x238B39C
        JP: 0x238C8FC
      description: |-
        Seems to display a simple_menu with wynaut's default portrait, a specified text string id, and a few simple_menu_id_item pointers.
        
        r0: struct recycle_shop_main
        r1: string_id
        r2: simple_menu_id_items pointer
    - name: RecycleShopTryHidePortraitBox
      address:
        EU: 0x238BF50
        NA: 0x238B410
        JP: 0x238C970
      description: |-
        Seems to hide the active portrait box? Might be doing something else in addition. 
        
        r0: struct recycle_shop_main pointer
        r1: ?
    - name: PrintWynautNormalPortrait
      address:
        EU: 0x238BFE8
        NA: 0x238B4A8
        JP: 0x238CA08
      description: |-
        Prepares a normal portrait for wynaut, and updates the necessary fields of recycle_shop_main to do so.
        
        r0: struct recycle_shop_main pointer
    - name: RecycleShopClosePortraitBox
      address:
        EU: 0x238C050
        NA: 0x238B510
        JP: 0x238CA70
      description: |-
        Seems to close the currently active portrait box, if one exists.
        
        r0: struct recycle_shop_main pointer
